services:
  - type: web
    name: fantasy-cycling-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: fantasy-cycling-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # set this manually to your Vercel URL after deploying frontend

databases:
  - name: fantasy-cycling-db
    databaseName: fantasy_cycling
    plan: free
