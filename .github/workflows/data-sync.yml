name: Data sync

on:
  schedule:
    - cron: "50 23 * * *"  # 23:50 UTC daily
  workflow_dispatch:        # allow manual run from the GitHub Actions UI

# sync_results, sync_riders, and sync_photos all scrape ProCyclingStats and
# get 403'd from cloud IPs. Run those locally with scripts/push_results.py
# and scripts/push_riders.py instead.
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      # Render free tier sleeps after 15 min of inactivity.
      # --max-time 90 gives it time to wake up before the snapshot call.
      - name: Wake up Render backend
        run: |
          curl --silent --max-time 90 \
            "${{ secrets.BACKEND_URL }}/api/health/" || true

      - name: take_snapshot
        run: |
          curl --fail --silent --show-error --location --max-time 30 --retry 2 \
            "${{ secrets.BACKEND_URL }}/api/admin/sync/take_snapshot/?secret=${{ secrets.SYNC_SECRET }}"
