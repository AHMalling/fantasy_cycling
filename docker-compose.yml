version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # Django backend
  # ---------------------------------------------------------------------------
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    command: >
      sh -c "pip install --quiet -r requirements.txt &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings

  # ---------------------------------------------------------------------------
  # Next.js frontend
  # ---------------------------------------------------------------------------
  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules        # anonymous volume so host node_modules don't leak in
    command: >
      sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env.local
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
